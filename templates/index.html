<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Pro</title>
    
  <link rel="stylesheet" href="/static/style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <button class="btn-mode" onclick="toggleDarkMode()">🌓 Cambiar Modo</button>

    <header>
        <h1>TaskFlow</h1>
        <form id="formulario-tarea" class="input-group">
            <input type="text" id="input-tarea" placeholder="¿Qué quieres lograr hoy?" required>
            
            <select id="input-prioridad" class="priority-select">
                <option value="Alta">Alta 🔥</option>
                <option value="Media" selected>Media ⚡</option>
                <option value="Baja">Baja ✅</option>
            </select>

            <button type="submit">Añadir Tarea</button>
        </form>
    </header>

    <main class="main-content">
        <div class="columna-principal">
            
            <div class="filter-container">
                <div class="filter-group">
                    <label><i class="fas fa-filter"></i> Filtrar Prioridad:</label>
                    <select id="filter-priority">
                        <option value="all">Todas</option>
                        <option value="Alta">Altas</option>
                        <option value="Media">Medias</option>
                        <option value="Baja">Bajas</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-sort-amount-down"></i> Ordenar por:</label>
                    <select id="sort-tasks">
                        <option value="date">Más recientes</option>
                        <option value="alpha">Nombre (A-Z)</option>
                        <option value="priority">Prioridad (A-M-B)</option>
                    </select>
                </div>
            </div>

            <h2>🚀 Tareas en Curso (Máximo 3)</h2>
            <div id="lista-tareas-activas"></div> 
            
            <hr style="margin: 30px 0; opacity: 0.1;">

            <details>
                <summary class="btn-archivo">📦 Ver Archivo (Pendientes y Completadas)</summary>
                <div id="lista-archivo"></div> 
            </details>
        </div>

        <aside id="estadisticas">
            <h2><i class="fas fa-chart-pie"></i> Resumen</h2>
            <hr>
            <div class="stat-item">
                <p><i class="fas fa-list-ul"></i> Total: <strong id="total-tareas">0</strong></p>
            </div>
            <div class="stat-item">
                <p><i class="fas fa-spinner fa-spin"></i> En curso: <strong id="en-proceso-tareas">0</strong></p>
            </div>
            <div class="stat-item">
                <p><i class="fas fa-check-circle"></i> Hechas: <strong id="completadas-tareas">0</strong></p>
            </div>
            <div class="stat-item">
                <p><i class="fas fa-clock"></i> Espera: <strong id="pendientes-tareas">0</strong></p>
            </div>
        </aside>
    </main>
<footer class="main-footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>TaskFlow Pro</h3>
                <p>Organiza tu éxito, una tarea a la vez.</p>
            </div>
            
            <div class="footer-section">
                <a href="https://github.com/NEPIGENEROSA" target="_blank" class="git-link">
                    <i class="fab fa-github"></i> Mi GitHub
                </a>
            </div>

            <div class="footer-section">
                <div class="tech-icons">
                    <i class="fab fa-python"></i>
                    <i class="fab fa-js"></i>
                    <i class="fab fa-html5"></i>
                </div>
            </div>
        </div>

        <div class="footer-bottom">
            <p>&copy; 2026 TaskFlow Pro - Gestión Inteligente de Tareas</p>
            <p>Hecho para la Bootcamp</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
